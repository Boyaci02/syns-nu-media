  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

* vietnamese */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"a1b474de-c5fd-4f26-b5f0-62889bcd6999\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"ad6b18cc-4c2e-4290-958c-c493336b8fc6\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"e11d07f7-6fd5-485a-b57e-498a5df41591\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ── Editorial pastel palette (v6 CIRLO direction) ───────── */\n  --edit-lavender:        #E8E1FF;\n  --edit-lavender-soft:   #F4EFFF;\n  --edit-lavender-chip:   #B9A3F7;\n  --edit-peach:           #FFCFA8;\n  --edit-peach-soft:      #FFE6D2;\n  --edit-peach-chip:      #FF9C6B;\n  --edit-olive:           #E5EE9E;\n  --edit-olive-chip:      #D4EB7A;\n  --edit-teal:            #4EBFB8;\n  --edit-cream:           #E5CDAB;\n  --edit-warm:            #F5D7B8;\n\n  /* ── Gemini palette (legacy v4 — kept for sub-pages) ─────── */\n  --g-blue:               #1A73E8;\n  --g-blue-dark:          #1557B0;\n  --g-blue-50:            #F0F4FA;\n  --g-blue-100:           #E3EDFC;\n  --g-purple:             #8B5CF6;\n  --g-pink:               #EC4899;\n  --g-gradient:           linear-gradient(135deg, #1A73E8 0%, #8B5CF6 50%, #EC4899 100%);\n  --g-gradient-soft:      linear-gradient(135deg, rgba(26,115,232,0.08) 0%, rgba(139,92,246,0.06) 50%, rgba(236,72,153,0.04) 100%);\n\n  /* ── Neutrals ────────────────────────────────────────────── */\n  --bg:                   #FFFFFF;\n  --bg-soft:              #F7F7F5;\n  --bg-tint:              #F4F4F2;\n  --bg-press:             #F3F1EC;\n  --bg-dark:              #0A0A0B;\n  --bg-dark-2:            #141416;\n\n  --text:                 #0F0F10;\n  --text-2:               #52525B;\n  --text-3:               #71717A;\n  --text-muted:           #A1A1AA;\n  --text-inv:             #FFFFFF;\n\n  --border:               #EAEAE6;\n  --border-strong:        #D4D4D0;\n  --border-dark:          rgba(255,255,255,0.08);\n\n  --success:              #10B981;\n  --warning:              #F59E0B;\n  --danger:               #EF4444;\n\n  /* ── Typography stacks ───────────────────────────────────── */\n  --font-sans:            'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n  --font-display:         'Plus Jakarta Sans', -apple-system, sans-serif;\n  --font-italic:          'Instrument Serif', Georgia, 'Times New Roman', serif;\n  --font-body:            var(--font-sans);\n\n  /* ── Type ramp (semantic) ────────────────────────────────── */\n  --fs-display:           clamp(2.75rem, 9vw, 7.5rem);   /* hero ALL-CAPS mark */\n  --fs-h1:                clamp(2.25rem, 6vw, 5rem);     /* page hero */\n  --fs-h2:                clamp(1.75rem, 3.8vw, 3.25rem);\n  --fs-h2-lg:             clamp(2.25rem, 5vw, 4rem);     /* big editorial */\n  --fs-h3:                clamp(1.125rem, 1.8vw, 1.625rem);\n  --fs-h4:                1.0625rem;\n  --fs-lead:              clamp(1.0625rem, 1.35vw, 1.1875rem);\n  --fs-body:              1rem;\n  --fs-sm:                0.9375rem;\n  --fs-xs:                0.8125rem;\n  --fs-eyebrow:           0.75rem;\n\n  /* ── Tracking ────────────────────────────────────────────── */\n  --tr-display:           -0.05em;\n  --tr-h1:                -0.045em;\n  --tr-h2:                -0.04em;\n  --tr-h3:                -0.02em;\n  --tr-body:              0;\n  --tr-eyebrow:           0.04em;\n\n  /* ── Line height ─────────────────────────────────────────── */\n  --lh-display:           0.95;\n  --lh-heading:           1.1;\n  --lh-body:              1.65;\n  --lh-tight:             1.5;\n\n  /* ── Radii ───────────────────────────────────────────────── */\n  --r-xs:                 6px;\n  --r-sm:                 10px;\n  --r-md:                 14px;\n  --r-lg:                 20px;\n  --r-xl:                 28px;\n  --r-2xl:                40px;\n  --r-card:               18px;   /* editorial card default */\n  --r-pill:               9999px;\n\n  /* ── Elevation ───────────────────────────────────────────── */\n  --shadow-xs:            0 1px 2px rgba(15,15,16,0.04);\n  --shadow-sm:            0 2px 8px rgba(15,15,16,0.06);\n  --shadow-md:            0 8px 24px rgba(15,15,16,0.08);\n  --shadow-lg:            0 20px 48px rgba(15,15,16,0.12);\n  --shadow-nav:           0 1px 3px rgba(15,15,16,0.04), 0 8px 32px -8px rgba(15,15,16,0.08);\n  --shadow-press:         0 24px 44px -10px rgba(0,0,0,0.28), 0 8px 16px -4px rgba(0,0,0,0.14);\n\n  /* ── Spacing scale ───────────────────────────────────────── */\n  --sp-1:                 4px;\n  --sp-2:                 8px;\n  --sp-3:                 12px;\n  --sp-4:                 16px;\n  --sp-5:                 24px;\n  --sp-6:                 32px;\n  --sp-7:                 48px;\n  --sp-8:                 64px;\n  --sp-9:                 96px;\n  --sp-section:           clamp(96px, 12vw, 160px);\n\n  /* ── Layout ──────────────────────────────────────────────── */\n  --container:            min(1400px, 94vw);\n  --container-wide:       min(1680px, 96vw);\n  --gutter:               24px;\n  --nav-h:                76px;\n\n  /* ── Motion ──────────────────────────────────────────────── */\n  --ease:                 cubic-bezier(0.4, 0, 0.2, 1);\n  --ease-out:             cubic-bezier(0.16, 1, 0.3, 1);\n  --ease-quart:           cubic-bezier(0.22, 1, 0.36, 1);\n  --dur-fast:             150ms;\n  --dur:                  260ms;\n  --dur-slow:             500ms;\n  --dur-reveal:           900ms;\n}\n\n/* ============================================================\n   BASE — minimal reset + body type\n   ============================================================ */\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\nhtml { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }\nbody {\n  font-family: var(--font-body);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  color: var(--text);\n  background: var(--bg);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\nimg, video, svg { max-width: 100%; height: auto; display: block; }\na { color: inherit; text-decoration: none; }\nul, ol { list-style: none; }\nbutton { cursor: pointer; font: inherit; border: none; background: none; color: inherit; }\n::selection { background: rgba(26,115,232,0.18); color: var(--text); }\n\n/* ============================================================\n   SEMANTIC TYPE — apply to plain HTML and it Just Looks Right™\n   ============================================================ */\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-display);\n  color: var(--text);\n  line-height: var(--lh-heading);\n  font-weight: 600;\n  overflow-wrap: break-word;\n  -webkit-hyphens: manual; hyphens: manual;\n}\nh1 { font-size: var(--fs-h1);    letter-spacing: var(--tr-h1); font-weight: 600; }\nh2 { font-size: var(--fs-h2);    letter-spacing: var(--tr-h2); font-weight: 600; }\nh3 { font-size: var(--fs-h3);    letter-spacing: var(--tr-h3); }\nh4 { font-size: var(--fs-h4);    letter-spacing: -0.015em; }\np  { color: var(--text-2); font-size: var(--fs-body); line-height: var(--lh-body); }\n\n/* Editorial display — used for big section titles in v6 */\n.display {\n  font-family: var(--font-display);\n  font-size: var(--fs-display);\n  line-height: var(--lh-display);\n  letter-spacing: var(--tr-display);\n  font-weight: 700;\n  text-transform: uppercase;\n}\n\n/* The signature italic-serif emphasis word, inline in a sans headline */\n.gradient-text,\nem.gradient-text {\n  font-family: var(--font-italic);\n  font-style: italic;\n  font-weight: 400;\n  letter-spacing: -0.015em;\n  color: inherit;\n}\n\n/* Hero lead — large editorial paragraph below ALL-CAPS mark */\n.lead, .editorial-lead {\n  font-size: var(--fs-lead);\n  line-height: 1.55;\n  color: var(--text-3);\n  max-width: 640px;\n  font-weight: 400;\n}\n\n/* Eyebrow / micro-label */\n.eyebrow {\n  display: inline-flex;\n  align-items: center;\n  font-size: var(--fs-eyebrow);\n  font-weight: 500;\n  letter-spacing: var(--tr-eyebrow);\n  color: var(--text-3);\n  text-transform: uppercase;\n}\n\n/* Caption / metadata */\n.meta { font-size: var(--fs-xs); color: var(--text-3); }\n\n/* Mono numerics (Swedish locale — comma decimals are formatted in JS) */\n.numeric { font-variant-numeric: tabular-nums; }\n<\u002Fstyle>\n<script src=\"ac8768e0-4235-4196-8212-67fe5ff18fc1\"><\u002Fscript>\n<style>\n  /* ============== DECK-LEVEL OVERRIDES ============== */\n  /* The design system uses fluid clamp() type, but slides are fixed at 1920×1080,\n     so we set hard pixel sizes that match the spirit of the system. */\n\n  html, body { background: #0A0A0B; }\n  deck-stage { background: #0A0A0B; }\n\n  section.slide {\n    background: var(--bg);\n    color: var(--text);\n    font-family: var(--font-sans);\n    position: relative;\n    overflow: hidden;\n    box-sizing: border-box;\n    display: block;\n    font-size: 22px;\n    line-height: var(--lh-body);\n  }\n  section.slide.dark      { background: var(--bg-dark);    color: rgba(255,255,255,0.92); }\n  section.slide.soft      { background: var(--bg-soft); }\n  section.slide.lavender  { background: var(--edit-lavender); }\n  section.slide.peach     { background: var(--edit-peach-soft); }\n  section.slide.olive     { background: var(--edit-olive); }\n  section.slide.cream     { background: var(--edit-warm); }\n\n  .slide-inner {\n    position: absolute;\n    inset: 0;\n    padding: 96px 120px;\n    box-sizing: border-box;\n  }\n\n  /* ============== TYPE PRIMITIVES (slide-scaled) ============== */\n  .eyebrow-d {\n    display: inline-flex; align-items: center; gap: 10px;\n    font-family: var(--font-sans);\n    font-size: 14px;\n    font-weight: 500;\n    letter-spacing: 0.18em;\n    color: var(--text-3);\n    text-transform: uppercase;\n  }\n  .dark .eyebrow-d { color: rgba(255,255,255,0.55); }\n  .eyebrow-d::before {\n    content: \"\"; width: 8px; height: 8px; border-radius: 50%;\n    background: var(--edit-peach-chip);\n  }\n\n  h1.h1, h2.h2 {\n    font-family: var(--font-display);\n    font-weight: 600;\n    color: var(--text);\n    margin: 0;\n  }\n  h1.h1 {\n    font-size: 88px;\n    line-height: 1.02;\n    letter-spacing: -0.045em;\n  }\n  h2.h2 {\n    font-size: 64px;\n    line-height: 1.05;\n    letter-spacing: -0.04em;\n  }\n  .dark h1.h1, .dark h2.h2 { color: #fff; }\n\n  /* The signature italic-serif emphasis word */\n  em.gs {\n    font-family: var(--font-italic);\n    font-style: italic;\n    font-weight: 400;\n    letter-spacing: -0.015em;\n    color: inherit;\n  }\n\n  .lead-d {\n    font-family: var(--font-sans);\n    font-size: 26px;\n    line-height: 1.55;\n    color: var(--text-3);\n    max-width: 1080px;\n    margin: 0;\n    font-weight: 400;\n  }\n  .dark .lead-d { color: rgba(255,255,255,0.65); }\n\n  /* ============== BRAND MARK ============== */\n  .wordmark {\n    font-family: var(--font-display);\n    font-weight: 700;\n    display: inline-flex; align-items: center; gap: 0.42em;\n    letter-spacing: -0.05em;\n    text-transform: uppercase;\n    line-height: 1;\n    display: inline-flex; align-items: center; gap: 0.25em;\n ms: center;\n  }\n  .pill-btn--dark .pill-btn__arrow { background: #fff; color: var(--text); }\n\n  /* Standard editorial card (white) */\n  .ed-card {\n    background: #fff;\n    border: 1px solid var(--border);\n    border-radius: var(--r-card);\n    padding: 32px;\n    box-sizing: border-box;\n    display: flex; flex-direction: column; gap: 14px;\n  }\n  .ed-card h3 {\n    font-family: var(--font-display); font-weight: 600;\n    font-size: 26px; letter-spacing: -0.025em; color: var(--text); margin: 0;\n    line-height: 1.2;\n  }\n  .ed-card p {\n    font-size: 18px; line-height: 1.55; color: var(--text-3); margin: 0;\n  }\n  .ed-card .icon-chip {\n    width: 48px; height: 48px; border-radius: 12px;\n    background: var(--bg-soft); border: 1px solid var(--border);\n    display: inline-grid; place-items: center; color: var(--text);\n  }\n\n  /* Service / pastel cards */\n  .svc-card {\n    border-radius: var(--r-card); padding: 32px; box-sizing: border-box;\n    display: flex; flex-direction: column; gap: 14px;\n    color: var(--text); flex: 1;\n  }\n  .svc-card.dark { background: #101010; color: #fff; }\n  .svc-card.dark h3, .svc-card.dark h4, .svc-card.dark h5 { color: #fff; }\n  .svc-card.dark p, .svc-card.dark .small { color: rgba(255,255,255,0.78); }\n  .svc-card.dark .small { color: rgba(255,255,255,0.62); }\n  /* Dark slides — make all card heads white when card sits on near-black */\n  section.slide.dark .ed-card { background: #141416; border-color: rgba(255,255,255,0.08); }\n  section.slide.dark .ed-card h3,\n  section.slide.dark .ed-card h4 { color: #fff; }\n  section.slide.dark .ed-card p { color: rgba(255,255,255,0.72); }\n  section.slide.dark .ed-card .icon-chip { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); color: #fff; }\n  section.slide.dark .svc-card h3,\n  section.slide.dark .svc-card h4,\n  section.slide.dark .svc-card h5 { color: #fff; }\n  .svc-card.lav   { background: var(--edit-lavender-chip); }\n  .svc-card.peach { background: var(--edit-peach); }\n  .svc-card.olive { background: var(--edit-olive-chip); }\n  .svc-card.teal  { background: var(--edit-teal); color: #fff; }\n  .svc-card.teal p, .svc-card.teal .small { color: rgba(255,255,255,0.85); }\n  .svc-card.cream { background: var(--edit-warm); }\n\n  .svc-card h4 {\n    font-family: var(--font-display); font-weight: 600;\n    font-size: 28px; letter-spacing: -0.025em; line-height: 1.15; margin: 0;\n  }\n  .svc-card p { font-size: 18px; line-height: 1.5; margin: 0; }\n  .svc-card .small { font-size: 15px; opacity: 0.78; margin-top: auto; }\n\n  /* Check + cross */\n  .check, .xmark {\n    display: inline-grid; place-items: center;\n    width: 26px; height: 26px; border-radius: 50%;\n    flex: 0 0 26px;\n    margin-top: 4px;\n  }\n  .check { background: rgba(16,185,129,0.14); color: var(--success); }\n  .xmark { background: rgba(15,15,16,0.06); color: var(--text-3); }\n  .dark .xmark { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); }\n\n  ul.bullets { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 14px; }\n  ul.bullets li { display: flex; gap: 14px; font-size: 19px; line-height: 1.5; align-items: flex-start; }\n\n  /* Stat ring (from stat-card preview) */\n  .ring-card {\n    background: #141416; color: #fff;\n    border-radius: 22px; padding: 28px;\n    display: flex; flex-direction: column; gap: 14px;\n    position: relative; box-sizing: border-box;\n    overflow: visible;\n  }\n  .ring { width: 460px; aspect-ratio: 1/1; align-self: center; position: relative; margin-top: -160px; z-index: 1; }\n  .ring svg { width: 100%; height: 100%; transform: rotate(-90deg); overflow: visible; }\n  .ring .track { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 14; }\n  .ring .seg   { fill: none; stroke-width: 14; stroke-linecap: round; }\n  .ring .txt   { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }\n  .ring .val   { font-family: var(--font-display); font-size: 76px; font-weight: 600; letter-spacing: -0.04em; line-height: 1; }\n  .ring .lbl   { font-size: 13px; color: rgba(255,255,255,0.55); letter-spacing: 0.18em; font-weight: 500; text-transform: uppercase; margin-top: 8px; }\n\n  .badge-chip {\n    position: absolute; padding: 6px 12px; border-radius: 9999px;\n    font-size: 12px; font-weight: 600; color: var(--text);\n    font-family: var(--font-sans); letter-spacing: -0.005em;\n    z-index: 3;\n  }\n\n  /* Page number tag */\n  .num-tag {\n    font-family: var(--font-italic); font-style: italic;\n    font-size: 32px; color: var(--edit-peach-chip);\n    letter-spacing: -0.01em;\n  }\n  .dark .num-tag { color: var(--edit-peach); }\n\n  /* Hairline */\n  .hr { height: 1px; background: var(--border); width: 100%; }\n  .dark .hr { background: rgba(255,255,255,0.08); }\n\n  /* Nav / cover stripe */\n  .ds-nav {\n    position: absolute; top: 56px; left: 120px; right: 120px;\n    display: flex; align-items: center; justify-content: space-between;\n  }\n\n<\u002Fstyle>\n\n<script type=\"application/json\" id=\"speaker-notes\">\n[\n  \"Hej och välkomna. Tack för att ni tar er tid. Jag heter [namn] från Syns Nu Media. Vi är Sveriges största marknadsföringsbyrå för restauranger — och idag vill jag visa er hur vi tänker, vad vi gör, och varför det syns i kassan, inte bara i visningar.\",\n  \"Så här ser dom kommande tjugo minuterna ut. Vi börjar med vilka vi är, problemet vi löser, vår filosofi, tjänsterna, priserna, riktiga resultat — och hur vi kommer igång tillsammans. Hugg mig mitt i om ni undrar något.\",\n  \"Vi är inte en generell byrå som råkar ta restaurangkunder. Vi är restaurangbyrån. Hundrasjuttio plus partners runt om i landet, och hundra procent av vår tid går till den här branschen.\",\n  \"Tre saker skadar restauranger just nu. Konkurrenten lägger redan pengar på TikTok och Instagram. Byråer producerar fina videos som får likes men ingen awareness hos rätt gäster. Och de flesta byråer förstår inte restaurangbranschen. Vi gör tvärtom på alla tre.\",\n  \"Det här är hjärtat. Vi mäter alla siffror från sociala medier och hemsidan — och följer hur de översätts till fler besökare i restaurangen. Tre principer styr allt vi gör — räckvidd som syns, partnerskap över tid, och total transparens.\",\n  \"Skillnaden mot en vanlig byrå. Vi pratar ert språk — marginaler, dagskassa, lojala gäster. Vi mäter det som faktiskt betyder något. Och vi är transparenta hela vägen.\",\n  \"Vi täcker hela kedjan. Sociala medier, webbdesign och menyfotografering. Allt jobbar tillsammans — det är därför det funkar.\",\n  \"Tjänst nummer ett — sociala medier. Vi bygger hela er digitala närvaro, från strategi till daglig hantering. Resultat: plus femtio procent dagskassa hos Östermalmsgrillen by Garo. Det är riktiga pengar.\",\n  \"Då priserna för sociala medier. Tre nivåer. Basic för er som vill synas lite mer, sju femhundra. Pro — vårt populäraste paket — tolv femhundra. Turbo, tjugofemtusen, för er som vill gasa hårt med nykundar. Sociala medier 3 mån bindning. Qopla-kunder får specialpris.\",\n  \"Webben och menyfotograferingen går hand i hand. En mobilanpassad sajt som konverterar. Och hela menyn fotograferad professionellt — redo för Foodora, Wolt, er egen sajt. Samma look överallt.\",\n  \"Här är fyra riktiga kundcase ni kan läsa själva — Fluffy House, Brams Burgers, Sushi Revolution och Mazraa. Klicka er in på varje case för strategin, leveranserna och resultatet. Det här är restauranger precis som er.\",\n  \"Lyssna på partners själva — George, Garo, Mansour. Restaurangägare precis som ni.\",\n  \"Hur vi kommer igång. Tre steg — ni introducerar, vi möter kunden, onboarding. Inga konstigheter.\",\n  \"Boka ett gratis möte. Inget säljsnack — bara en ärlig genomgång. Tack för er tid.\"\n]\n<\u002Fscript>\n<\u002Fhead>\n<body>\n\n<deck-stage width=\"1920\" height=\"1080\">\n\n  <!-- ============== SLIDE 1 — COVER (DARK HERO) ============== -->\n  <section class=\"slide dark\" data-label=\"01 Cover\">\n    <div class=\"ds-nav\">\n      <span class=\"wordmark\" style=\"font-size: 26px;\">\n        <img class=\"hash-mark\" alt=\"\" src=\"5d10da01-fa4c-4162-9ca1-51d9bc85555c\">\n        <span>SYNSNU<\u002Fspan>\n        <span class=\"dash\">—<\u002Fspan>\n        <span style=\"opacity:0.7; font-weight: 500;\">MEDIA<\u002Fspan>\n      <\u002Fspan>\n      <span style=\"font-family: var(--font-sans); font-size: 14px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.55); font-weight: 500;\">\n        För våra samarbetspartners · 2026\n      <\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"position:absolute; left: 120px; right: 120px; top: 50%; transform: translateY(-52%);\">\n      <div class=\"eyebrow-d\" style=\"margin-bottom: 40px;\">Lär känna byrån — så ni kan sälja oss vidare<\u002Fdiv>\n      <h1 class=\"h1\" style=\"font-size: 148px; line-height: 0.95; max-width: 1600px\">\n        Det här är <em class=\"gs\">Syns Nu<\u002Fem><br>\n        — byrån era kunder<br>\n        kommer älska.\n      <\u002Fh1>\n      <p class=\"lead-d\" style=\"margin-top: 48px; max-width: 1100px; font-size: 28px;\">\n        En genomgång av vilka vi är, hur vi jobbar och varför restauranger stannar hos oss — så ni kan föra det vidare till era kunder med trygghet.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"position:absolute; bottom: 56px; left: 120px; right: 120px; display: flex; justify-content: space-between; align-items: end; color: rgba(255,255,255,0.45); font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 500;\">\n      <span>Stockholm · Sverige<\u002Fspan>\n      <span>info@synsnumedia.se · 070-842 58 33<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============== SLIDE 2 — INNEHÅLL ============== -->\n  <section class=\"slide\" data-label=\"02 Innehåll\">\n    <div class=\"slide-inner\">\n      <div class=\"eyebrow-d\">Innehåll<\u002Fdiv>\n      <h1 class=\"h1\" style=\"margin-top: 24px;\">\n        Det här tar vi<br>er igenom idag.\n      <\u002Fh1>\n\n      <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 36px 80px; margin-top: 64px;\">\n        <div style=\"display: grid; grid-template-columns: 80px 1fr; gap: 24px; align-items: start;\">\n          <span class=\"num-tag\">01<\u002Fspan>\n          <div>\n            <h3 style=\"font-family: var(--font-display); font-size: 26px; font-weight: 600; letter-spacing: -0.02em; margin: 0 0 6px;\">Vilka vi är<\u002Fh3>\n            <p style=\"margin: 0; color: var(--text-3); font-size: 19px; line-height: 1.5;\">Sveriges nischbyrå för restauranger — sedan dag ett.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: grid; grid-template-columns: 80px 1fr; gap: 24px; align-items: start;\">\n          <span class=\"num-tag\">02<\u002Fspan>\n          <div>\n            <h3 style=\"font-family: var(--font-display); font-size: 26px; font-weight: 600; letter-spacing: -0.02em; margin: 0 0 6px;\">Marknaden vi möter<\u002Fh3>\n            <p style=\"margin: 0; color: var(--text-3); font-size: 19px; line-height: 1.5;\">Restauranger som tappar gäster till osynlighet.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: grid; grid-template-columns: 80px 1fr; gap: 24px; align-items: start;\">\n          <span class=\"num-tag\">03<\u002Fspan>\n          <div>\n            <h3 style=\"font-family: var(--font-display); font-size: 26px; font-weight: 600; letter-spacing: -0.02em; margin: 0 0 6px;\">Vår filosofi<\u002Fh3>\n            <p style=\"margin: 0; color: var(--text-3); font-size: 19px; line-height: 1.5;\">Vi mäter framgång i dagskassa, inte visningar.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: grid; grid-template-columns: 80px 1fr; gap: 24px; align-items: start;\">\n          <span class=\"num-tag\">04<\u002Fspan>\n          <div>\n            <h3
